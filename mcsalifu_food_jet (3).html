<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCSALIFU FOOD JET</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f5f5f5;color:#333;}
header{
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
background-size:cover;background-position:center;height:90vh;color:white;
display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
}
header h1{font-size:4rem;}
header p{font-size:1.3rem;margin:15px 0;}
.btn{padding:12px 25px;background:#ff6600;color:white;border:none;border-radius:8px;cursor:pointer;text-decoration:none;}
nav{background:#111;padding:15px;text-align:center;position:sticky;top:0;}
nav a{color:white;text-decoration:none;margin:0 15px;font-weight:bold;}
section{padding:50px 20px;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
.card img{width:100%;height:200px;object-fit:cover;}
.card-content{padding:15px;}
.card h3{margin-bottom:10px;}
.card button{margin-top:10px;width:100%;padding:10px;background:#28a745;color:white;border:none;border-radius:8px;cursor:pointer;}
#cart{background:#fff3e6;border-radius:15px;padding:20px;max-width:500px;margin:auto;}
footer{background:#111;color:white;text-align:center;padding:20px;}
</style>
</head>
<body>
<header>
<h1>MCSALIFU FOOD JET</h1>
<p>Fast Delivery • Local & Foreign Delicious Meals</p>
<a href="#menu" class="btn">Order Now</a>
</header>

<nav>
<a href="#home">Home</a>
<a href="#menu">Restaurant Menu</a>
<a href="#cart-section">Cart</a>
</nav>

<section id="menu">
<h2 style="text-align:center;margin-bottom:30px;">Restaurant Menu</h2>
<div class="menu-grid">
<div class="card">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
<div class="card-content">
<h3>Jollof Rice</h3>
<p>GHS 35</p>
<button onclick="addToCart('Jollof Rice',35)">Add to Cart</button>
</div>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1">
<div class="card-content">
<h3>Burger Combo</h3>
<p>GHS 50</p>
<button onclick="addToCart('Burger Combo',50)">Add to Cart</button>
</div>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd">
<div class="card-content">
<h3>Healthy Salad</h3>
<p>GHS 30</p>
<button onclick="addToCart('Healthy Salad',30)">Add to Cart</button>
</div>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1598515214211-89d3c73ae83b">
<div class="card-content">
<h3>Pizza</h3>
<p>GHS 65</p>
<button onclick="addToCart('Pizza',65)">Add to Cart</button>
</div>
</div>
</div>
</section>

<section id="cart-section">
<h2 style="text-align:center;margin-bottom:20px;">Your Cart</h2>
<div id="cart">
<ul id="cart-items"></ul>
<h3>Total: GHS <span id="total">0</span></h3>
</div>
</section>

<footer>
<p>© 2026 MCSALIFU FOOD JET | Delivering Happiness Daily</p>
</footer>

<script>
let cart=[];
let total=0;
function addToCart(item,price){
cart.push({item,price});
total+=price;
updateCart();
}
function updateCart(){
const cartItems=document.getElementById('cart-items');
cartItems.innerHTML='';
cart.forEach(product=>{
let li=document.createElement('li');
li.textContent=`${product.item} - GHS ${product.price}`;
cartItems.appendChild(li);
});
document.getElementById('total').textContent=total;
}
</script>
</body>
</html>
